<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/fontawesome.min.css" integrity="sha512-M5Kq4YVQrjg5c2wsZSn27Dkfm/2ALfxmun0vUE3mPiJyK53hQBHYCVAtvMYEC7ZXmYLg8DVG4tF8gD27WmDbsg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css" integrity="sha512-WxpJXPm/Is1a/dzEdhdaoajpgizHQimaLGL/QqUIAjIihlQqlPQb1V9vkGs9+VzXD7rgI6O+UsSKl4u5K36Ydw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/solid.min.css" integrity="sha512-EHa6vH03/Ty92WahM0/tet1Qicl76zihDCkBnFhN3kFGQkC+mc86d7V+6y2ypiLbk3h0beZAGdUpzfMcb06cMg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Recipes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');

        :root {
            --white-primary: #fff;
            --black-primary: #222222;
            --medium-padding: 3rem;
            --gray-color: #9b9b9b;
            --gray-color-light: #dbd9d9;
            --blue-primay: #3b90d6;
            --blue-primay-dark: #081c2e;
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 62.5%;
        }

        body {
            font-family: 'Roboto Slab', serif;
            font-size: 1.6rem;
            background: rgb(230, 230, 230);
        }

        .main-logo {
            font-size: 4rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #fff;
            text-decoration: none;
            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
            width: fit-content;
            margin: 0 auto;
        }

        .main-logo-icon {
            margin-right: 1rem;
        }

        h1,h2,h3,h4,h5,h6 {
            color: var(--black-primary)
        }

        .container {
            max-width: 144rem;
            margin: 0 auto;
            padding: 3rem;
        }

        .main-header-container {
            background: #13141f;
        }

        .search-form {
            border: .2rem solid #13141f;
            max-width: 64rem;
            margin: 0 auto;
            border-radius: 4px;
            position: relative;
            transition: all 150ms ease-in-out;
        }
        
        .search-form:focus-within {
            border-color: var(--blue-primay);
            background: var(--white-primary);
        }

        .search-form:focus-within .search-button {
            color: var(--blue-primay);
        }

        .search-button:hover{
            cursor: pointer;
            outline: 1pc solid color(#13141f);
            background: rgba(0, 0, 0, 0.093);
            border-radius: 4px;
        }

        .search-input,
        .search-button {
            border: none;
            background: none;
            outline: none;
            padding: 1rem;
            transition: all 150ms ease-in-out;
        }

        .search-input {
            width: 100%;
            padding-right: 3rem;
            box-shadow: 2px 4px 4px rgba(15, 11, 11, 0.099);
        }

        .search-button{
            position: absolute;
            top: 0;
            right: 0;
        }

        .main-content {
            padding-top: 0;
        }

        .main-content-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 4rem;
        }

        .recipe {
            background: var(--white-primary);
            box-shadow: -5px 5px 10px rgba(15, 11, 11, 0.2);
            transition: all 300ms ease-in-out;
            transform: scale(1);
            border-radius: .4rem;
            overflow: hidden;
        }

        .recipe img{
            max-width: 100%;
        }

        .recipe-list-item {
            max-width: 64rem;
        }
        .recipe-list-item:hover {
            transform: scale(1.05);
            box-shadow: -8px 8px 18px rgba(15, 11, 11, 0.3);
        }

        .recipe-title-container{
            padding: var(--medium-padding);
            padding-bottom: 2rem;
        }

        .recipe-author {
            padding: var(--medium-padding);
        }

        .recipe-author-item {
            color: var(--gray-color);
            margin-right: 1rem;
        }

        .recipe-author a{
            color: var(--blue-primay);
            transition: all 300ms ease-in-out;
            text-decoration: none;
        }

        .recipe-author a:hover {
            color: var(--blue-primay-dark);
        }

        .recipe-content {
            padding: var(--medium-padding);
            padding-top: 2rem;
        }

        .recipe-meta-container {
            display: flex;
            flex-flow: row wrap;
            padding: var(--medium-padding);
            background: var(--gray-color-light);
        }

        .recipe-meta {
            display: flex;
            flex-flow: column nowrap;
            flex-shrink: 1;
            flex-grow: 1;
            text-align: center;
        }

        .recipe-footer a{
            background: var(--blue-primay-dark);
            display: block;
            color: var(--white-primary);
            text-decoration: none;
            text-align: center;
            padding: 2rem var(--medium-padding);
            transition: all 300ms ease-in-out
        }

        .recipe-footer a:hover {
            filter: brightness(2);
        }
    </style>
</head>
